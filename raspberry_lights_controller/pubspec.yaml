name: raspberry_lights_controller
description: An app for controlling the light pattern run by a Raspberry Pi.

version: 0.4.0

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.1"

dependencies:
  bonsoir: ^7.1.1
  dio: ^5.0.3
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.0.15

dev_dependencies:
  build_runner:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.0+1
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: false
  image_path: "assets/launch_icon_v2.png"
  adaptive_icon_background: "#FF303030"
  adaptive_icon_foreground: "assets/launch_icon_foreground_v2.png"
